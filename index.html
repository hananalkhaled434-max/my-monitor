<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="5">
    <title>تنبيه أمني!</title>
    <style>
        body { 
            background: #600; /* لون أحمر غامق للتحذير */
            color: white; 
            text-align: center; 
            font-family: sans-serif; 
            padding-top: 50px;
            animation: blink 0.5s infinite; /* حركة فلاش للشاشة */
        }
        @keyframes blink {
            0% { background: #600; }
            50% { background: #f00; }
            100% { background: #600; }
        }
        .warning-icon { font-size: 100px; margin-bottom: 20px; }
        .box { background: rgba(0,0,0,0.5); padding: 20px; margin: 20px; border-radius: 15px; border: 2px solid yellow; }
    </style>
</head>
<body onclick="startVibrate()">

    <div class="warning-icon">⚠️</div>
    <h1>تم اكتشاف محاولة اختراق!</h1>
    
    <div class="box">
        <h2>نظام الحماية نشط الآن</h2>
        <h3 style="color: yellow;">اترك الهاتف فوراً يا بطل 😉</h3>
    </div>

    <p>سيتم قفل الجهاز مؤقتاً للمراجعة...</p>

    <script>
        // وظيفة الاهتزاز
        function startVibrate() {
            if (navigator.vibrate) {
                // سيهتز الجهاز: اهتزاز 500 ملي ثانية، هدوء 200، ثم اهتزاز 500
                navigator.vibrate([500, 200, 500, 200, 1000]);
            }
        }
        
        // محاولة تشغيل الاهتزاز تلقائياً عند التحميل
        window.onload = function() {
            startVibrate();
        };
    </script>
</body>
</html>
