<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="10">
    <title>سليم البطل</title>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .kfo { font-size: 60px; color: #ffeb3b; margin: 0; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .btn { background: #ff9800; color: white; border: none; padding: 15px 30px; font-size: 20px; border-radius: 10px; margin-top: 20px; cursor: pointer; }
        #msg { display: none; background: white; color: black; padding: 20px; border-radius: 15px; margin: 20px; border: 3px solid #ff9800; }
    </style>
</head>
<body>
    <p class="kfo">كفووو 🥳</p>
    <h1>ألف مبروك يا بطل! 🎉</h1>
    
    <button class="btn" onclick="show()">انقر لرؤية الرسالة 📄👇</button>

    <div id="msg">
        <h2 style="color: #ff9800;">تنبيه للقائد سليم 🖨️</h2>
        <p style="font-size: 22px; font-weight: bold;">انت بتحب الأندومي.</p>
    </div>

    <script>
        function show() {
            document.getElementById('msg').style.display = 'block';
        }
    </script>
</body>
</html>
