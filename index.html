<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="5">
    <title>نظام المراقبة الذكي</title>
    <style>
        body { 
            background: #000; 
            color: #0f0; 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding-top: 30px; 
            margin: 0;
        }
        .radar { 
            border: 3px solid #0f0; 
            border-radius: 50%; 
            width: 80px; 
            height: 80px; 
            margin: 10px auto; 
            border-top-color: transparent; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        img { 
            width: 80%; 
            max-width: 250px; 
            border: 2px solid #0f0; 
            border-radius: 15px; 
            box-shadow: 0 0 15px #0f0;
            margin: 20px 0;
        }
        
        .status { color: #fff; font-size: 14px; opacity: 0.7; }
        .msg-box { background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 20px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="radar"></div>
    <h2 style="margin: 0;">نظام المراقبة نشط 📡</h2>
    <p class="status">يتم التحديث تلقائياً كل 5 ثوانٍ</p>

    <img src="https://i.gifer.com/7S7z.gif" alt="Radar Screen">

    <div class="msg-box">
        <h3 style="color: #fff; margin-bottom: 5px;">الرسالة الحالية:</h3>
        <h1 style="color: yellow; margin-top: 0;">اترك الهاتف واذهب للمذاكرة! ✍️😉</h1>
    </div>

    <p style="font-size: 12px; color: #555;">القائد المتحكم: محمد البطل</p>

</body>
</html>
